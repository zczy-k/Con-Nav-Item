name: Auto Bump Version

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump level
        id: bump_level
        shell: bash
        run: |
          MESSAGE=$(jq -r '.head_commit.message // ""' "$GITHUB_EVENT_PATH")
          echo "Head commit message: $MESSAGE"

          if echo "$MESSAGE" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+\(.+\)!:|^[a-zA-Z]+!:'; then
            LEVEL="major"
          elif echo "$MESSAGE" | grep -Eq '^feat\(.+\):|^feat:'; then
            LEVEL="minor"
          else
            LEVEL="patch"
          fi

          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Selected bump level: $LEVEL"

      - name: Bump version and sync
        run: |
          npm version ${{ steps.bump_level.outputs.level }} --no-git-tag-version
          npm run sync:version

      - name: Refresh lockfiles
        run: |
          npm install --package-lock-only
          npm install --prefix web --package-lock-only

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json web/package.json web/package-lock.json browser-extension/manifest.json browser-extension/popup.html README.md
          git commit -m "chore(release): auto bump ${{ steps.bump_level.outputs.level }} version [skip ci]" || echo "No changes to commit"
          git push
