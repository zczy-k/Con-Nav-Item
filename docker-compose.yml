services:
  Con-Nav-Item:
    image: ghcr.io/zczy-k/con-nav-item:latest
    container_name: Con-Nav-Item
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: 123456
      JWT_SECRET: change-this-secret
      CRYPTO_SECRET: change-this-too
      # Set to false on low-resource platforms if backup jobs trigger restarts.
      AUTO_BACKUP_ENABLED: "true"
    volumes:
      - ./database:/app/database
      - ./backups:/app/backups
      - ./config:/app/config
    restart: unless-stopped
