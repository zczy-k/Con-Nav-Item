<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNavora 插件</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f9fafb;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header img { width: 24px; height: 24px; }
        .header h2 { font-size: 14px; color: #333; }
        .header .version { font-size: 11px; color: #999; }
        .header-subtitle {
            font-size: 11px;
            color: #6b7280;
            margin: 6px 0 10px 0;
            line-height: 1.4;
        }
        .info {
            background: white;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .info-label { font-size: 11px; color: #666; margin-bottom: 3px; }
        .info-value {
            font-size: 12px;
            color: #333;
            background: #f3f4f6;
            padding: 4px 6px;
            border-radius: 4px;
        }
        .buttons { display: flex; gap: 6px; margin-bottom: 8px; }
        .buttons.vertical { flex-direction: column; }
        button {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { box-shadow: 0 2px 8px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: white;
            color: #333;
            border: 1px solid #e5e7eb;
        }
        .btn-secondary:hover { background: #f5f5f5; }
        .btn-bookmarks {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        .btn-bookmarks:hover { box-shadow: 0 2px 8px rgba(245,158,11,0.4); }
        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin: 10px 0 6px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        input:checked + .slider:before {
            transform: translateX(16px);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img src="icons/icon48.png" alt="导航站">
            <h2>SmartNavora 插件</h2>
        </div>
        <span class="version">v1.0.6</span>
    </div>

    <div class="header-subtitle">用于打开导航页、整理浏览器书签，并通过右键快速添加到导航页。</div>

    <div class="info" id="navUrlInfo">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="info-label" style="margin: 0;">导航站地址</div>
            <div class="info-value" id="currentUrl" style="font-size: 11px;">未设置</div>
        </div>
    </div>

    <div class="buttons" id="navButtons">
        <button class="btn-primary" id="openSettings">⚙️ 设置地址</button>
        <button class="btn-secondary" id="openNav">🌐 管理后台</button>
    </div>

    <div class="buttons">
        <button class="btn-bookmarks" id="openBookmarks">📚 书签管理器</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
