<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航站插件 - 设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e4e8;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-with-button {
            display: flex;
            gap: 10px;
        }
        
        .input-with-button input {
            flex: 1;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        button {
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .btn-test {
            background: #f0f9ff;
            color: #0369a1;
            border: 1px solid #bae6fd;
            white-space: nowrap;
        }
        
        .btn-test:hover {
            background: #e0f2fe;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            display: none;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 6px;
            padding: 16px;
            margin-top: 24px;
        }

        .toggle-card {
            margin-top: 20px;
            padding: 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #fafafa;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .toggle-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .toggle-desc {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
            line-height: 1.6;
        }


        .switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #d1d5db;
            transition: 0.2s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: 0.2s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #10b981;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }
        
        .info-box h3 {
            color: #0369a1;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .info-box p {
            color: #075985;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .current-url {
            background: #f9fafb;
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            color: #667eea;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
        }
        
        .connection-status.connected {
            background: #d1fae5;
            color: #065f46;
        }
        
        .connection-status.disconnected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .connection-status.unknown {
            background: #f3f4f6;
            color: #6b7280;
        }
        
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ 导航站设置</h1>
        <p class="subtitle">修改你的导航站地址</p>
        
        <div class="message" id="message"></div>
        
        <!-- 导航站地址设置 -->
        <div class="section-title">
            导航站地址
            <span class="connection-status unknown" id="connectionStatus">未测试</span>
        </div>
        
        <div class="form-group">
            <div class="input-with-button">
                <input 
                    type="url" 
                    id="navUrl" 
                    placeholder="https://your-domain.com"
                    autocomplete="off"
                />
                <button class="btn-test" id="testBtn">测试连接</button>
            </div>
            <div class="current-url" id="currentUrl" style="display: none;">
                当前地址：<span id="currentUrlText"></span>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" id="saveBtn">保存设置</button>
            <button class="btn-secondary" id="resetBtn">重置</button>
        </div>

        <div class="toggle-card">
            <div class="toggle-row">
                <div class="toggle-title">显示悬浮添加按钮</div>
                <label class="switch">
                    <input type="checkbox" id="showFloatingBtn" checked />
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-desc">在网页右侧显示快速添加悬浮按钮。按钮会自动贴边隐藏，仅露出一条细线；鼠标靠近或点击时丝滑展开，避免遮挡网页内容。</div>
        </div>

        <div class="info-box">
            <h3>💡 使用提示</h3>
            <p>• 输入你的导航站完整地址（包含 http:// 或 https://）</p>
            <p>• 点击"测试连接"验证地址是否有效</p>
            <p>• 设置后，每次打开新标签页都会自动跳转到该地址</p>
            <p>• 你可以随时在这里修改地址</p>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
